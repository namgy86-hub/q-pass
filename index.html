<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q-PASS : 급식소 대기인원 파악 시스템</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- TensorFlow.js & COCO-SSD Model -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    
    <style>
        .light-active {
            box-shadow: 0 0 40px currentColor;
            opacity: 1 !important;
            transform: scale(1.05);
            transition: all 0.3s ease;
        }
        .light-inactive {
            opacity: 0.2;
            transform: scale(1);
            transition: all 0.3s ease;
        }
        @keyframes alert-blink {
            0%, 100% { background-color: #ea580c; box-shadow: 0 0 15px #ea580c; }
            50% { background-color: #f97316; box-shadow: 0 0 30px #f97316; }
        }
        .animate-alert-blink {
            animation: alert-blink 1.5s infinite;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800 font-sans transition-all duration-500">

    <!-- 메인 화면 -->
    <div id="view-home" class="relative flex flex-col items-center justify-center min-h-screen p-4 bg-gradient-to-br from-indigo-50 to-blue-50">
        <div class="bg-white p-10 rounded-3xl shadow-2xl max-w-lg w-full text-center border border-indigo-100/50">
            <h1 class="text-5xl font-black text-indigo-600 mb-2 tracking-tight">Q-PASS</h1>
            <p class="text-gray-500 font-medium mb-10">급식소 대기인원 실시간 알리미 (클라우드 연동)</p>
            
            <button onclick="app.showUserMode()" class="w-full py-8 px-6 bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-blue-600 hover:to-indigo-700 text-white rounded-2xl font-black text-2xl shadow-xl hover:shadow-2xl transition-all duration-300 transform hover:-translate-y-1 flex flex-col items-center justify-center gap-4">
                <span class="text-5xl">🚦</span>
                <span>급식소 대기 신호등 확인하기</span>
            </button>
        </div>

        <div class="absolute bottom-6 right-6">
            <button onclick="app.showAdminMode()" class="px-4 py-2.5 bg-gray-800/10 hover:bg-gray-800/20 text-gray-600 hover:text-gray-800 rounded-xl text-sm font-bold transition-all flex items-center gap-1.5 shadow-sm">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
                관리자 설정
            </button>
        </div>
    </div>

    <!-- 사용자 모드 (신호등 화면) -->
    <div id="view-user" class="hidden flex-col items-center justify-center min-h-[100dvh] p-4 bg-gray-900 transition-colors duration-700 relative overflow-hidden">
        
        <div id="next-grade-banner" class="hidden w-full max-w-md p-4 mb-4 rounded-2xl text-white font-black text-center text-lg sm:text-xl animate-alert-blink flex-col items-center justify-center gap-1 z-10 border border-orange-400/30">
            <div id="banner-title">📢 다음 학년 급식 이동 알림</div>
            <div id="banner-desc" class="text-xs sm:text-sm font-medium opacity-90">다음 학년은 급식소로 이동을 준비해 주세요!</div>
        </div>

        <div class="absolute top-0 left-0 w-full p-4 flex justify-between items-center z-10">
            <button onclick="app.goHome()" class="text-white bg-white/20 backdrop-blur-md px-4 py-2 rounded-xl hover:bg-white/30 transition shadow-lg font-bold">
                &larr; 처음으로
            </button>
            <button onclick="app.toggleFullScreen()" class="text-white bg-white/20 backdrop-blur-md px-4 py-2 rounded-xl hover:bg-white/30 transition shadow-lg font-bold flex gap-2 items-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4" /></svg>
                전체화면
            </button>
        </div>

        <div class="text-center mb-6 mt-12 z-10">
            <h2 class="text-3xl sm:text-4xl font-black text-white tracking-tight drop-shadow-md">급식소 대기 신호등</h2>
            <p id="user-status-text" class="text-xl sm:text-2xl font-bold text-green-400 drop-shadow-lg mt-2">클라우드 연결 중...</p>
        </div>

        <div class="bg-gray-800 p-4 sm:p-6 rounded-[3rem] border-8 border-gray-700 shadow-[0_0_50px_rgba(0,0,0,0.5)] flex flex-col gap-4 sm:gap-6 items-center z-10 w-full max-w-[200px] sm:max-w-[250px]">
            <div id="light-red" class="w-20 h-20 sm:w-28 sm:h-28 rounded-full bg-red-500 text-red-500 light-inactive flex items-center justify-center">
                <span class="text-white font-black text-lg sm:text-2xl opacity-0 transition-opacity drop-shadow-md" id="text-red">혼잡</span>
            </div>
            <div id="light-yellow" class="w-20 h-20 sm:w-28 sm:h-28 rounded-full bg-yellow-400 text-yellow-400 light-inactive flex items-center justify-center">
                <span class="text-gray-900 font-black text-lg sm:text-2xl opacity-0 transition-opacity drop-shadow-md" id="text-yellow">보통</span>
            </div>
            <div id="light-green" class="w-20 h-20 sm:w-28 sm:h-28 rounded-full bg-green-500 text-green-500 light-inactive flex items-center justify-center">
                <span class="text-white font-black text-lg sm:text-2xl opacity-0 transition-opacity drop-shadow-md" id="text-green">여유</span>
            </div>
        </div>
        
        <div class="mt-6 flex flex-col items-center gap-4 w-full max-w-sm z-10 px-4">
            <div class="bg-gray-800/60 backdrop-blur-sm px-6 py-3 rounded-2xl shadow-lg border border-gray-600/50 w-full text-center">
                <div class="text-gray-300 text-md sm:text-lg flex items-center justify-center gap-3">
                    현재 대기 인원: <span id="user-person-count" class="text-white font-black text-3xl sm:text-4xl">0</span> <span class="text-gray-400 font-bold">명</span>
                </div>
            </div>

            <div class="bg-gray-800/60 backdrop-blur-sm p-4 rounded-2xl border border-gray-600/50 w-full space-y-3">
                <button id="btn-grade3-alert" onclick="app.toggleGradeAlert('grade3')" class="w-full py-3 px-4 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-bold text-sm sm:text-md shadow-md transition-all flex items-center justify-center gap-2 active:scale-95">
                    📢 3학년 완료 &rarr; 다음 학년 준비
                </button>
                <button id="btn-grade2-alert" onclick="app.toggleGradeAlert('grade2')" class="w-full py-3 px-4 bg-purple-600 hover:bg-purple-700 text-white rounded-xl font-bold text-sm sm:text-md shadow-md transition-all flex items-center justify-center gap-2 active:scale-95">
                    📢 2학년 완료 &rarr; 다음 학년 준비
                </button>
            </div>
        </div>
    </div>

    <!-- 관리자 모드 (카메라 화면) -->
    <div id="view-admin" class="hidden flex-col items-center justify-start min-h-screen p-4 bg-gray-100 overflow-y-auto">
        <div class="w-full max-w-4xl flex justify-between items-center mb-4">
            <button onclick="app.goHome()" class="text-gray-700 bg-white shadow px-4 py-2 rounded-lg hover:bg-gray-50 transition font-bold">
                &larr; 설정 종료
            </button>
            <div class="bg-white px-4 py-2 rounded-lg shadow font-bold text-indigo-600">
                급식소 인원 인식 카메라 구동중
            </div>
        </div>

        <div class="w-full max-w-4xl grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
            <div class="bg-white p-4 rounded-xl shadow text-center">
                <div class="text-gray-500 text-sm">인식된 인원</div>
                <div id="admin-person-count" class="text-4xl font-black text-blue-600">0</div>
            </div>
            <div class="bg-white p-4 rounded-xl shadow text-center">
                <div class="text-gray-500 text-sm">현재 혼잡도</div>
                <div id="admin-status-text" class="text-2xl font-bold text-green-500 mt-2">여유</div>
            </div>
            <div class="bg-white p-4 rounded-xl shadow text-center">
                <div class="text-gray-500 text-sm">AI 모델 상태</div>
                <div id="admin-model-status" class="text-lg font-bold text-orange-500 mt-2">로딩중...</div>
            </div>
        </div>

        <div class="relative w-full max-w-4xl bg-black rounded-2xl overflow-hidden shadow-2xl aspect-video">
            <video id="webcam" class="absolute top-0 left-0 w-full h-full object-cover" autoplay playsinline muted></video>
            <canvas id="canvas" class="absolute top-0 left-0 w-full h-full object-cover"></canvas>
            
            <div id="loading-overlay" class="absolute inset-0 bg-gray-900 bg-opacity-80 flex flex-col items-center justify-center text-white z-10">
                <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-blue-500 mb-4"></div>
                <p class="text-xl font-bold">AI 모델 및 카메라 준비중...</p>
                <p class="text-sm text-gray-300 mt-2">최초 실행 시 다소 시간이 소요될 수 있습니다.</p>
            </div>
        </div>
        
        <div class="mt-4 text-sm text-gray-500 bg-white p-4 rounded-lg shadow w-full max-w-4xl mb-8">
            <b>설정 기준:</b> 여유(0~10명), 보통(11~30명), 혼잡(31명 이상)
        </div>
    </div>

    <!-- 커스텀 모달 UI -->
    <div id="custom-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl transform transition-all">
            <h3 id="modal-title" class="text-xl font-bold text-gray-800 mb-2">알림</h3>
            <p id="modal-desc" class="text-gray-600 mb-4 text-sm whitespace-pre-line"></p>
            <input type="password" id="modal-input" class="hidden w-full border border-gray-300 rounded-lg px-4 py-3 mb-4 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-lg" onkeypress="if(event.key==='Enter') document.getElementById('modal-confirm').click();">
            <div class="flex justify-end gap-2">
                <button id="modal-cancel" class="px-4 py-2 rounded-lg text-gray-600 bg-gray-100 hover:bg-gray-200 font-bold transition">취소</button>
                <button id="modal-confirm" class="px-4 py-2 rounded-lg text-white bg-indigo-600 hover:bg-indigo-700 font-bold transition">확인</button>
            </div>
        </div>
    </div>

    <!-- 파이어베이스 SDK (v11 모듈 방식) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        // =====================================================================
        // 🚨 실제 파이어베이스 설정값 적용 완료!
        // =====================================================================
        const firebaseConfig = {
            apiKey: "AIzaSyC2l9SaMCtLysQdD78MjNBpIiWZJP2To1w",
            authDomain: "qpass-app.firebaseapp.com",
            projectId: "qpass-app",
            storageBucket: "qpass-app.firebasestorage.app",
            messagingSenderId: "314970797856",
            appId: "1:314970797856:web:9fe6f638947d67ef5b4945"
        };
        // =====================================================================

        // 파이어베이스 초기화
        const fApp = initializeApp(firebaseConfig);
        const db = getFirestore(fApp);
        
        // 데이터가 저장될 클라우드 문서 경로 (qpass/current_state)
        const stateDoc = doc(db, 'qpass', 'current_state');

        // 전역 앱 로직
        const app = {
            THRESHOLD_YELLOW: 11,
            THRESHOLD_RED: 31,

            model: null, video: null, canvas: null, ctx: null,
            isDetecting: false, animationId: null, stream: null, wakeLock: null, 
            modalCallback: null, 
            
            // 메모리 상태 관리
            state: { count: 0, alert: 'none' },
            lastSentCount: -1,
            lastSyncTime: 0,

            init() {
                this.video = document.getElementById('webcam');
                this.canvas = document.getElementById('canvas');
                this.ctx = this.canvas.getContext('2d');
                
                // ☁️ [클라우드 데이터 수신] Firestore 실시간 감지
                onSnapshot(stateDoc, (doc) => {
                    if (doc.exists()) {
                        const data = doc.data();
                        if (data.count !== undefined) this.state.count = data.count;
                        if (data.alert !== undefined) this.state.alert = data.alert;
                        
                        this.updateUserView();
                        this.updateNextGradeAlertView();
                    }
                }, (error) => {
                    console.error("클라우드 수신 에러:", error);
                });
            },

            // ☁️ [클라우드 데이터 송신] Firestore 저장 기능 (과부하 방지 쓰로틀링 적용)
            async syncToCloud(force = false) {
                const now = Date.now();
                // 1초(1000ms)에 한 번씩만 클라우드로 전송하거나, 버튼 클릭 시엔 즉시(force) 전송
                if (force || now - this.lastSyncTime > 1000) {
                    this.lastSyncTime = now;
                    try {
                        await setDoc(stateDoc, {
                            count: this.state.count,
                            alert: this.state.alert
                        });
                    } catch (e) {
                        console.error("클라우드 송신 에러 (규칙 설정이 '테스트 모드'인지 확인하세요):", e);
                    }
                }
            },

            hideAllViews() {
                document.getElementById('view-home').classList.add('hidden');
                document.getElementById('view-home').classList.remove('flex');
                document.getElementById('view-user').classList.add('hidden');
                document.getElementById('view-user').classList.remove('flex');
                document.getElementById('view-admin').classList.add('hidden');
                document.getElementById('view-admin').classList.remove('flex');
            },

            toggleFullScreen() {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(err => {});
                } else {
                    if (document.exitFullscreen) document.exitFullscreen();
                }
            },

            async requestWakeLock() {
                try { if ('wakeLock' in navigator) this.wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
            },
            releaseWakeLock() {
                if (this.wakeLock !== null) { this.wakeLock.release().then(() => { this.wakeLock = null; }); }
            },

            goHome() {
                this.stopAdminMode();
                this.releaseWakeLock(); 
                if (document.fullscreenElement && document.exitFullscreen) document.exitFullscreen();
                this.hideAllViews();
                document.getElementById('view-home').classList.remove('hidden');
                document.getElementById('view-home').classList.add('flex');
            },

            showModal(options) {
                const modal = document.getElementById('custom-modal');
                document.getElementById('modal-title').innerText = options.title || "알림";
                document.getElementById('modal-desc').innerText = options.desc || "";
                
                const inputEl = document.getElementById('modal-input');
                if (options.type === 'prompt') {
                    inputEl.classList.remove('hidden');
                    inputEl.value = '';
                    inputEl.placeholder = options.placeholder || "입력하세요";
                    inputEl.type = options.isPassword ? "password" : "text";
                    setTimeout(() => inputEl.focus(), 100); 
                } else {
                    inputEl.classList.add('hidden');
                }

                this.modalCallback = options.onConfirm || null;
                modal.classList.remove('hidden');

                document.getElementById('modal-cancel').onclick = () => { modal.classList.add('hidden'); };
                document.getElementById('modal-confirm').onclick = () => {
                    const val = inputEl.value;
                    modal.classList.add('hidden');
                    if (this.modalCallback) this.modalCallback(val);
                };
            },

            showUserMode() {
                this.hideAllViews();
                document.getElementById('view-user').classList.remove('hidden');
                document.getElementById('view-user').classList.add('flex');
                this.requestWakeLock();
                this.updateUserView();
                this.updateNextGradeAlertView();
            },

            showAdminMode() {
                this.showModal({
                    title: "관리자 인증",
                    desc: "카메라를 구동하기 위해\n관리자 비밀번호를 입력하세요.",
                    type: "prompt",
                    isPassword: true,
                    placeholder: "비밀번호를 입력하세요",
                    onConfirm: (password) => {
                        if (password === "2026") {
                            this.hideAllViews();
                            document.getElementById('view-admin').classList.remove('hidden');
                            document.getElementById('view-admin').classList.add('flex');
                            this.startAdminMode();
                        } else if (password !== "") {
                            this.showModal({ title: "인증 실패", desc: "비밀번호가 일치하지 않습니다.", type: "alert" });
                        }
                    }
                });
            },

            updateUserView() {
                const count = this.state.count;
                const userCountEl = document.getElementById('user-person-count');
                if (!userCountEl) return;
                userCountEl.innerText = count;

                const lGreen = document.getElementById('light-green');
                const lYellow = document.getElementById('light-yellow');
                const lRed = document.getElementById('light-red');
                const tGreen = document.getElementById('text-green');
                const tYellow = document.getElementById('text-yellow');
                const tRed = document.getElementById('text-red');
                const statusText = document.getElementById('user-status-text');

                [lGreen, lYellow, lRed].forEach(el => {
                    if(el) { el.classList.remove('light-active'); el.classList.add('light-inactive'); }
                });
                [tGreen, tYellow, tRed].forEach(el => { if(el) el.style.opacity = '0'; });

                const viewUser = document.getElementById('view-user');
                if (viewUser) viewUser.classList.remove('bg-gray-900', 'bg-red-950', 'bg-yellow-950', 'bg-green-950');

                if (count >= this.THRESHOLD_RED) {
                    if (lRed) { lRed.classList.remove('light-inactive'); lRed.classList.add('light-active'); }
                    if (tRed) tRed.style.opacity = '1';
                    if (statusText) {
                        statusText.innerText = "현재 매우 혼잡합니다";
                        statusText.className = "text-2xl sm:text-3xl font-black text-red-500 drop-shadow-lg mt-2";
                    }
                    if (viewUser) viewUser.classList.add('bg-red-950');
                } else if (count >= this.THRESHOLD_YELLOW) {
                    if (lYellow) { lYellow.classList.remove('light-inactive'); lYellow.classList.add('light-active'); }
                    if (tYellow) tYellow.style.opacity = '1';
                    if (statusText) {
                        statusText.innerText = "현재 약간 혼잡합니다";
                        statusText.className = "text-2xl sm:text-3xl font-black text-yellow-400 drop-shadow-lg mt-2";
                    }
                    if (viewUser) viewUser.classList.add('bg-yellow-950');
                } else {
                    if (lGreen) { lGreen.classList.remove('light-inactive'); lGreen.classList.add('light-active'); }
                    if (tGreen) tGreen.style.opacity = '1';
                    if (statusText) {
                        statusText.innerText = "현재 대기줄이 여유롭습니다";
                        statusText.className = "text-2xl sm:text-3xl font-black text-green-400 drop-shadow-lg mt-2";
                    }
                    if (viewUser) viewUser.classList.add('bg-green-950');
                }
            },

            toggleGradeAlert(type) {
                const nextAlert = (this.state.alert === type) ? 'none' : type;
                this.state.alert = nextAlert;
                
                // ☁️ 상태 변경 즉시 클라우드 업로드
                this.syncToCloud(true);
                this.updateNextGradeAlertView();
            },

            updateNextGradeAlertView() {
                const activeAlert = this.state.alert;
                const banner = document.getElementById('next-grade-banner');
                const bannerTitle = document.getElementById('banner-title');
                const bannerDesc = document.getElementById('banner-desc');
                const btn3 = document.getElementById('btn-grade3-alert');
                const btn2 = document.getElementById('btn-grade2-alert');

                if (!btn3 || !btn2 || !banner) return;

                btn3.innerText = "📢 3학년 완료 → 다음 학년 준비";
                btn3.className = "w-full py-3 px-4 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-bold text-sm sm:text-md shadow-md transition-all flex items-center justify-center gap-2 active:scale-95";
                
                btn2.innerText = "📢 2학년 완료 → 다음 학년 준비";
                btn2.className = "w-full py-3 px-4 bg-purple-600 hover:bg-purple-700 text-white rounded-xl font-bold text-sm sm:text-md shadow-md transition-all flex items-center justify-center gap-2 active:scale-95";

                if (activeAlert === 'none') {
                    banner.classList.add('hidden');
                    banner.classList.remove('flex');
                } else {
                    banner.classList.remove('hidden');
                    banner.classList.add('flex');

                    if (activeAlert === 'grade3') {
                        if (bannerTitle) bannerTitle.innerText = "📢 [3학년 배식완료] 다음 학년 이동 알림";
                        if (bannerDesc) bannerDesc.innerText = "다음 학년은 급식소로 이동을 준비해 주세요!";
                        btn3.innerText = "⚠️ 3학년 알림 전송 중 (클릭 시 해제)";
                        btn3.className = "w-full py-3 px-4 bg-orange-600 hover:bg-orange-700 text-white rounded-xl font-bold text-sm sm:text-md shadow-md transition-all flex items-center justify-center gap-2 active:scale-95 animate-pulse";
                    } else if (activeAlert === 'grade2') {
                        if (bannerTitle) bannerTitle.innerText = "📢 [2학년 배식완료] 다음 학년 이동 알림";
                        if (bannerDesc) bannerDesc.innerText = "다음 학년은 급식소로 이동을 준비해 주세요!";
                        btn2.innerText = "⚠️ 2학년 알림 전송 중 (클릭 시 해제)";
                        btn2.className = "w-full py-3 px-4 bg-orange-600 hover:bg-orange-700 text-white rounded-xl font-bold text-sm sm:text-md shadow-md transition-all flex items-center justify-center gap-2 active:scale-95 animate-pulse";
                    }
                }
            },

            async startAdminMode() {
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    this.showModal({ title: "카메라 사용 불가", desc: "카메라 환경을 확인해주세요.", type: "alert", onConfirm: () => this.goHome() });
                    return;
                }

                document.getElementById('loading-overlay').classList.remove('hidden');

                try {
                    this.stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 480 } }, audio: false });
                    this.video.srcObject = this.stream;
                    await new Promise((resolve) => { this.video.onloadedmetadata = () => { resolve(); }; });
                    try { await this.video.play(); } catch(e) {}
                    this.canvas.width = this.video.videoWidth;
                    this.canvas.height = this.video.videoHeight;

                    if (!this.model) this.model = await cocoSsd.load();

                    document.getElementById('loading-overlay').classList.add('hidden');
                    document.getElementById('admin-model-status').innerText = "작동중 (정상)";
                    document.getElementById('admin-model-status').className = "text-lg font-bold text-blue-500 mt-2";
                    
                    this.isDetecting = true;
                    this.detectFrame();
                } catch (err) {
                    document.getElementById('loading-overlay').classList.add('hidden');
                    this.showModal({ title: "오류", desc: "카메라 연결에 실패했습니다.", type: "alert", onConfirm: () => this.goHome() });
                }
            },

            async detectFrame() {
                if (!this.isDetecting) return;

                try {
                    const predictions = await this.model.detect(this.video);
                    const persons = predictions.filter(p => p.class === 'person');
                    const personCount = persons.length;

                    this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                    
                    persons.forEach(person => {
                        const [x, y, width, height] = person.bbox;
                        this.ctx.strokeStyle = '#00FF00'; this.ctx.lineWidth = 4;
                        this.ctx.strokeRect(x, y, width, height);
                        this.ctx.fillStyle = '#00FF00'; this.ctx.fillRect(x, y - 24, 100, 24);
                        this.ctx.fillStyle = '#000000'; this.ctx.font = '16px sans-serif';
                        this.ctx.fillText(`사람 (${Math.round(person.score * 100)}%)`, x + 5, y - 6);
                    });

                    document.getElementById('admin-person-count').innerText = personCount;
                    const statusEl = document.getElementById('admin-status-text');
                    
                    if (personCount >= this.THRESHOLD_RED) {
                        statusEl.innerText = "혼잡 (빨강)"; statusEl.className = "text-2xl font-bold text-red-500 mt-2";
                    } else if (personCount >= this.THRESHOLD_YELLOW) {
                        statusEl.innerText = "보통 (노랑)"; statusEl.className = "text-2xl font-bold text-yellow-500 mt-2";
                    } else {
                        statusEl.innerText = "여유 (초록)"; statusEl.className = "text-2xl font-bold text-green-500 mt-2";
                    }

                    // ☁️ 인원수가 변경되었을 때만 클라우드에 업로드 시도
                    if (this.lastSentCount !== personCount) {
                        this.lastSentCount = personCount;
                        this.state.count = personCount;
                        this.syncToCloud(false); // 쓰로틀링(1초 간격) 전송
                    }

                    this.animationId = requestAnimationFrame(() => this.detectFrame());
                } catch (err) {
                    this.animationId = requestAnimationFrame(() => this.detectFrame());
                }
            },

            stopAdminMode() {
                this.isDetecting = false;
                if (this.animationId) cancelAnimationFrame(this.animationId);
                if (this.stream) { this.stream.getTracks().forEach(track => track.stop()); this.stream = null; }
                this.video.srcObject = null;
                if(this.ctx && this.canvas) this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                
                this.state.count = 0;
                this.syncToCloud(true); // 0으로 초기화 후 강제 전송
            }
        };

        // 앱 시작
        window.app = app;
        window.onload = () => { app.init(); };
    </script>
</body>
</html>
